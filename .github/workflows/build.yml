name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# To add ARM64 later: add a matrix (include: [{arch: x86_64, runs-on: windows-latest},
# {arch: arm64, runs-on: windows-11-arm}]) and adjust GOARCH + MinGW per arch.
# ARM64 needs extra toolchain work (msys2 mingw-w64-clang-aarch64 + WebView2 ARM).
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # action-gh-release needs write to create the release
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Compute version
        shell: pwsh
        run: |
          # tag → tag name (v1.0.0); branch → branch-runNumber (master-42)
          $ver = if ($env:GITHUB_REF -like 'refs/tags/*') { $env:GITHUB_REF_NAME } else { "$($env:GITHUB_REF_NAME)-$($env:GITHUB_RUN_NUMBER)" }
          "VERSION=$ver" >> $env:GITHUB_ENV

      - name: Install MinGW-w64 (gcc for CGO)
        shell: pwsh
        run: choco install mingw -y --no-progress

      - name: Download WebView2 bootstrapper (embedded, excluded from repo by .gitignore)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/windows | Out-Null
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
            -OutFile "build/windows/MicrosoftEdgeWebview2Setup.exe"

      - name: Build frontend
        shell: pwsh
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build NetSwitcher.exe
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "1"
          go build -tags "desktop,production" `
            -ldflags "-X main.version=$($env:VERSION) -H windowsgui" `
            -o build/bin/NetSwitcher.exe ./cmd/netswitcher

      - name: Run tests
        shell: pwsh
        run: go test ./...

      # upload-artifact auto-zips on download, so the artifact name carries the
      # version + arch suffix — downloaded as NetSwitcher-<version>-x86_64-portable.zip
      - uses: actions/upload-artifact@v5
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: NetSwitcher-${{ env.VERSION }}-x86_64-portable
          path: build/bin/NetSwitcher.exe
          if-no-files-found: error

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/NetSwitcher.exe `
            -DestinationPath "build/bin/NetSwitcher-$($env:VERSION)-x86_64-Portable.zip"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: build/bin/NetSwitcher-*-x86_64-Portable.zip
          body: |
            Windows 内外网路由管理工具 —— 双网卡按网段自动分流 + 域名解析 + 自动更新。

            ## 主要功能
            - **IP 路由分流**：指定网段(CIDR)走指定网卡（如 168.168.0.0/16 → 以太网），其余走默认网卡；网络变化自动重下发
            - **默认路由 metric 管理**：让首选网卡（WLAN）赢得默认路由，插有线也不抢
            - **域名解析规则（NRPT）**：`*.domain` 走指定 DNS（内网域名走内网 DNS，直连快）
            - **自动更新**：设置页检查 + 一键升级
            - **系统托盘**：提权运行左右键稳定（已修 UIPI）
            - **开机自启静默**：登录后只进托盘，不弹窗打扰

            ## 下载
            `NetSwitcher-v*-x86_64-Portable.zip` —— 解压即用，**需以管理员身份运行**（修改路由表需要）。

            首次运行检测到非提权会弹“以管理员身份重启”；建议设置页开“开机自启”（任务计划最高权限，登录自动提权免 UAC）。

            详细使用见 [README](https://github.com/HuangXiao-12138/netswitcher#readme)。MIT 许可。
